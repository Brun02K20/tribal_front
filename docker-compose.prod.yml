services:
  backend:
    container_name: tribal_backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    network_mode: "host"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 3001
    restart: unless-stopped


  frontend:
    container_name: tribal_frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: https://api.tribaltrend.com.ar
    ports:
      - "3002:3000"
    depends_on:
      - backend
    restart: unless-stopped

  landing:
    container_name: tribal_landing
    build:
      context: ./landing
      dockerfile: Dockerfile
    env_file:
      - ./landing/.env
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3003:3000"
    restart: unless-stopped